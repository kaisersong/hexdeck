name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HexDeck ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

  generate-latest-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: kaisersong/hexdeck
          tag: ${{ github.ref_name }}
          fileName: '*.tar.gz*'
          out-file-path: ./assets

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          ARM64_SIG=""
          if [ -f assets/HexDeck_*aarch64*.tar.gz.sig ]; then
            ARM64_SIG=$(cat assets/HexDeck_*aarch64*.tar.gz.sig)
          fi

          ARM64_URL="https://github.com/kaisersong/hexdeck/releases/download/${GITHUB_REF_NAME}/HexDeck_${VERSION}_aarch64.app.tar.gz"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${GITHUB_REF_NAME}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${ARM64_SIG}",
                "url": "${ARM64_URL}"
              }
            }
          }
          EOF

          cat latest.json

      - name: Upload latest.json
        uses: softprops/action-gh-release@v1
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
